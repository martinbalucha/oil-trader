name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Lint
        run: dotnet format src/OilTrader.sln --verify-no-changes

      - name: Build
        run: dotnet build src/OilTrader.sln --no-incremental -c Release

      - name: Test
        run: dotnet test src/OilTrader.sln --no-build -c Release
